<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Add Dorm - Dorm Near Me!</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #9b86bd;
            --light-purple: #e2d5f3;
            --nav-purple: #9154f1;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
        }

        .top-banner {
            background-color: var(--nav-purple);
            color: white;
            text-align: center;
            padding: 8px;
            font-size: 14px;
        }

        /* Navigation */
        .navbar {
            background: white;
            display: flex;
            justify-content: flex-start;
            padding: 0 50px;
            border-bottom: 1px solid #eee;
            margin-bottom: 20px;
        }

        .nav-item {
            padding: 15px 25px;
            cursor: pointer;
            color: #555;
            font-weight: 400;
            transition: 0.2s;
            text-decoration: none;
        }

        .nav-item:hover {
            color: var(--purple);
        }

        .nav-item.active {
            border-bottom: 3px solid var(--purple);
            color: var(--purple);
            font-weight: bold;
        }

        /* Layout Container */
        .container {
            max-width: 1100px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .form-grid {
            display: flex;
            gap: 40px;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .form-column {
            flex: 1;
            min-width: 300px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }

        .form-input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-family: 'Kanit';
            font-size: 16px;
            transition: 0.2s;
        }

        .form-input:focus {
            border-color: var(--purple);
            outline: none;
            box-shadow: 0 0 5px rgba(155, 134, 189, 0.4);
        }

        .form-textarea {
            height: 100px;
            resize: none;
        }

        /* Large Purple Block for Checkboxes */
        .checkbox-block {
            background-color: var(--purple);
            padding: 15px;
            border-radius: 10px;
            color: white;
            margin-bottom: 20px;
        }

        .checkbox-block h4 {
            margin: 0 0 10px 0;
            font-size: 18px;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-item input {
            accent-color: var(--nav-purple);
            scale: 1.2;
        }

        /* Darker purple accent */

        /* Gray Multi-Select Grid */
        .multi-select-container {
            background-color: #f1f1f1;
            padding: 15px;
            border-radius: 10px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .multi-select-column h4 {
            margin: 0 0 10px 0;
            color: #333;
        }

        .multi-select-list {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            max-height: 100px;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        /* Large Action Button */
        .btn-purple {
            background-color: var(--purple);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 20px;
            font-family: 'Kanit';
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            width: 100%;
        }

        .btn-purple:hover {
            background-color: var(--nav-purple);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        /* General Large Purple Upload Button from image */
        .btn-large-upload {
            background-color: var(--purple);
            color: white;
            border: none;
            padding: 20px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            font-family: 'Kanit';
            cursor: pointer;
            text-align: center;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>

<body>

    <div class="top-banner">
        ข้อมูลที่รวบรวมมาจาก Facebook และ google map โปรดตรวจสอบข้อมูลอีกครั้ง
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-item">ค้นหาหอพัก</a>
        <a href="add-dorm.html" class="nav-item active">เพิ่มข้อมูล</a>
        <a href="map.html" class="nav-item">แผนที่</a>
        <div class="nav-item">ติดต่อเรา</div>
    </nav>

    <div class="container">

        <div class="form-grid">

            <div class="form-column">
                <div class="form-group">
                    <label class="form-label">Upload (สูงสุด 10 รูป)</label>

                    <input type="file" id="actual-upload" accept="image/*" multiple style="display: none;">

                    <button type="button" class="btn-large-upload" id="custom-upload-btn">
                        + Upload Pictures
                    </button>

                    <div id="preview-gallery"
                        style="display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; margin-top: 15px;">
                    </div>

                    <p id="file-count" style="font-size: 12px; color: #777; margin-top: 5px; text-align: center;"></p>
                </div>

                <script>
                    const actualBtn = document.getElementById('actual-upload');
                    const customBtn = document.getElementById('custom-upload-btn');
                    const previewGallery = document.getElementById('preview-gallery');
                    const fileCountTxt = document.getElementById('file-count');

                    // We store the files in an array so we can manipulate them
                    let selectedFiles = [];

                    customBtn.addEventListener('click', () => actualBtn.click());

                    actualBtn.addEventListener('change', function () {
                        const newFiles = Array.from(this.files);

                        // Add new files to our array, but keep the total under 10
                        selectedFiles = [...selectedFiles, ...newFiles].slice(0, 10);

                        renderPreviews();
                    });

                    function renderPreviews() {
                        previewGallery.innerHTML = "";

                        selectedFiles.forEach((file, index) => {
                            const reader = new FileReader();

                            reader.onload = function (e) {
                                // Wrapper for the image and the delete button
                                const wrapper = document.createElement('div');
                                wrapper.style.position = "relative";
                                wrapper.style.width = "100%";
                                wrapper.style.paddingTop = "100%";
                                wrapper.style.borderRadius = "10px";
                                wrapper.style.overflow = "hidden";
                                wrapper.style.border = "2px solid var(--purple)";

                                // The Thumbnail Image
                                const img = document.createElement('img');
                                img.src = e.target.result;
                                img.style.position = "absolute";
                                img.style.top = "0";
                                img.style.width = "100%";
                                img.style.height = "100%";
                                img.style.objectFit = "cover";

                                // The "X" Delete Button
                                const deleteBtn = document.createElement('button');
                                deleteBtn.innerHTML = "&times;"; // The multiplication sign (X)
                                deleteBtn.style.position = "absolute";
                                deleteBtn.style.top = "5px";
                                deleteBtn.style.right = "5px";
                                deleteBtn.style.background = "rgba(155, 134, 189, 0.9)"; // Semi-transparent purple
                                deleteBtn.style.color = "white";
                                deleteBtn.style.border = "none";
                                deleteBtn.style.borderRadius = "50%";
                                deleteBtn.style.width = "24px";
                                deleteBtn.style.height = "24px";
                                deleteBtn.style.cursor = "pointer";
                                deleteBtn.style.fontWeight = "bold";
                                deleteBtn.style.display = "flex";
                                deleteBtn.style.alignItems = "center";
                                deleteBtn.style.justifyContent = "center";
                                deleteBtn.style.zIndex = "10";

                                // Click event for deleting
                                deleteBtn.onclick = function (event) {
                                    event.preventDefault();
                                    removeFile(index);
                                };

                                wrapper.appendChild(img);
                                wrapper.appendChild(deleteBtn);
                                previewGallery.appendChild(wrapper);
                            }

                            reader.readAsDataURL(file);
                        });

                        updateUI();
                    }

                    function removeFile(index) {
                        selectedFiles.splice(index, 1); // Remove from the array
                        renderPreviews(); // Redraw the gallery
                    }

                    function updateUI() {
                        fileCountTxt.innerText = selectedFiles.length > 0
                            ? `เลือกแล้ว ${selectedFiles.length} รูป (สูงสุด 10)`
                            : "";
                        customBtn.innerText = selectedFiles.length > 0 ? "Add/Change Photos" : "+ Upload pics";
                    }
                </script>

                <div class="form-group">
                    <label class="form-label">ชื่อหอพัก</label>
                    <input type="text" class="form-input" placeholder="กรอกชื่อหอพัก">
                </div>

                <div class="form-group">
                    <label class="form-label">รายละเอียด</label>
                    <textarea class="form-input form-textarea" placeholder="กรอกรายละเอียด"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">ที่อยู่</label>
                    <input type="text" class="form-input" placeholder="กรอกที่อยู่">
                </div>

                <div class="form-group">
                    <div
                        style="border: 2px solid var(--purple); border-radius: 10px; padding: 10px; text-align: center; color: var(--purple); font-weight: bold;">
                        [ Embed Map Placeholder ]
                        <div style="margin-top: 10px; font-weight: normal; font-size: 14px;">(Map Select/Map button
                            would go here)</div>
                    </div>
                </div>
            </div>

            <div class="form-column">
                <div class="checkbox-block">
                    <h4>สถานที่รอบ ๆ</h4>
                    <div class="checkbox-grid">
                        <label class="checkbox-item"><input type="checkbox"> ป้ายรถเมล์ มอ</label>
                        <label class="checkbox-item"><input type="checkbox"> 7-11</label>
                        <label class="checkbox-item"><input type="checkbox"> ร้านขายยา</label>
                        <label class="checkbox-item"><input type="checkbox"> ตลาด</label>
                        <label class="checkbox-item"><input type="checkbox"> ร้านซักอบผ้า</label>
                    </div>
                </div>

                <div class="checkbox-block">
                    <h4>สิ่งอำนวยความสะดวกในห้อง</h4>
                    <div class="checkbox-grid">
                        <label class="checkbox-item"><input type="checkbox"> แอร์</label>
                        <label class="checkbox-item"><input type="checkbox"> ไมโครเวฟ</label>
                        <label class="checkbox-item"><input type="checkbox"> พัดลม</label>
                        <label class="checkbox-item"><input type="checkbox"> ตู้เย็น</label>
                    </div>
                </div>

                <div class="multi-select-container">
                    <div class="multi-select-column">
                        <h4>ประเภทหอพัก</h4>
                        <div class="multi-select-list">
                            <label><input type="checkbox"> หอรวม</label>
                            <label><input type="checkbox"> หอหญิง</label>
                            <label><input type="checkbox"> หอชาย</label>
                        </div>
                    </div>
                    <div class="multi-select-column">
                        <h4>โซนที่พักอาศัย</h4>
                        <div class="multi-select-list">
                            <label><input type="checkbox"> ฝั่งมอ</label>
                            <label><input type="checkbox"> ฝั่งตรงข้ามมอ</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-column">
                <div class="form-group">
                    <label class="form-label">ข้อมูลติดต่อ</label>
                    <input type="text" class="form-input" placeholder="ชื่อผู้ติดต่อ">
                </div>

                <div class="form-group">
                    <label class="form-label">เบอร์โทร</label>
                    <input type="text" id="phone-input" class="form-input" placeholder="081-xxx-xxxx" maxlength="10"
                        oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                    <small id="phone-error" style="color: #ff4444; font-size: 11px; display: none;">ต้องกรอกตัวเลขให้ครบ
                        10 หลัก</small>
                </div>

                <div class="form-group">
                    <label class="form-label">Line ID / FB</label>
                    <input type="text" class="form-input" placeholder="กรอกข้อมูลติดต่อ">
                </div>

                <div class="form-group">
                    <label class="form-label">ราคา</label>
                    <input type="number" class="form-input" placeholder="ค่าเช่า" min="0">
                </div>

                <div class="form-group">
                    <input type="number" class="form-input" placeholder="ค่าประกัน" min="0">
                </div>

                <div class="form-group">
                    <label class="form-label">กฎ</label>
                    <textarea class="form-input form-textarea" placeholder="กฎกติกาของหอพัก"></textarea>
                </div>

                <button class="btn-purple">บันทึก</button>
            </div>

        </div>
    </div>
</body>

</html>
